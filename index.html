<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="logo-icon">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                </path>
                <polyline points="3.29 7 12 12 20.71 7"></polyline>
                <line x1="12" y1="22" x2="12" y2="12"></line>
            </svg>
            <span>Prism</span>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active">Discover</a></li>
            <li><a href="#">Collections</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

    <header class="header">
        <div class="header-content">
            <h1>The Memory Vault</h1>
            <p>A beautiful space for your memories.</p>

            <div class="upload-section drop-zone" id="drop-zone">
                <!-- Hidden file input -->
                <input type="file" id="image-upload" accept="image/png, image/jpeg, image/gif" multiple hidden>

                <div class="drop-zone-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="upload-icon" style="color: var(--accent-color); margin-bottom: 0.5rem;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <p class="drop-text" style="color: var(--text-secondary); margin-bottom: 1rem;">Drag & drop images
                        here, or</p>
                    <button id="upload-btn" class="btn-primary">
                        Browse Files
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="gallery-container">
        <div id="gallery" class="gallery-grid">
            <!-- Initial Mock Images -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=600&auto=format&fit=crop"
                    alt="Night lights" loading="lazy">
                <div class="item-overlay"><span>View</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=600&auto=format&fit=crop"
                    alt="Event crowd" loading="lazy">
                <div class="item-overlay"><span>View</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?q=80&w=600&auto=format&fit=crop"
                    alt="Concert" loading="lazy">
                <div class="item-overlay"><span>View</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?q=80&w=600&auto=format&fit=crop"
                    alt="Live music" loading="lazy">
                <div class="item-overlay"><span>View</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?q=80&w=600&auto=format&fit=crop"
                    alt="Band playing" loading="lazy">
                <div class="item-overlay"><span>View</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?q=80&w=600&auto=format&fit=crop"
                    alt="Festival" loading="lazy">
                <div class="item-overlay"><span>View</span></div>
            </div>

            <!-- See More Tile -->
            <div class="gallery-item see-more-card" id="see-more-btn">
                <div class="see-more-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="see-more-icon">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                    <span>See More</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="logo-icon">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z">
                    </path>
                    <polyline points="3.29 7 12 12 20.71 7"></polyline>
                    <line x1="12" y1="22" x2="12" y2="12"></line>
                </svg>
                <span>Prism</span>
            </div>
            <p>&copy; 2026 Prism. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" id="close-lightbox">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Fullscreen View">
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
</body>

</html>
